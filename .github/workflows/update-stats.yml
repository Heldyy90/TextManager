name: Update project stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  release:
    types:
      - published
      - edited
      - deleted

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_stats.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update project stats"
          file_pattern: "README.md STATS.md"
